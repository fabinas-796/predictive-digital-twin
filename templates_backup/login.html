<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InfraGuard AI — Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #020818;
        --bg2: #0a1628;
        --card: #0d1f3c;
        --border: #1a3a5c;
        --accent: #00d4ff;
        --accent2: #0088cc;
        --green: #00ff88;
        --red: #ff4757;
        --text: #e0e8f0;
        --muted: #4a6080;
        --font-mono: "Share Tech Mono", monospace;
        --font-main: "Rajdhani", sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-main);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* ── Animated grid background ── */
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(var(--border) 1px, transparent 1px),
          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.3;
        animation: gridPulse 8s ease-in-out infinite;
      }

      @keyframes gridPulse {
        0%,
        100% {
          opacity: 0.15;
        }
        50% {
          opacity: 0.3;
        }
      }

      /* ── Floating orbs ── */
      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.15;
        animation: orbFloat 12s ease-in-out infinite;
      }

      .orb-1 {
        width: 400px;
        height: 400px;
        background: var(--accent);
        top: -100px;
        left: -100px;
        animation-delay: 0s;
      }

      .orb-2 {
        width: 300px;
        height: 300px;
        background: var(--green);
        bottom: -80px;
        right: -80px;
        animation-delay: -4s;
      }

      .orb-3 {
        width: 200px;
        height: 200px;
        background: var(--accent2);
        top: 50%;
        left: 60%;
        animation-delay: -8s;
      }

      @keyframes orbFloat {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(30px, -20px) scale(1.05);
        }
        66% {
          transform: translate(-20px, 30px) scale(0.95);
        }
      }

      /* ── Scan line effect ── */
      .scanline {
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 212, 255, 0.015) 2px,
          rgba(0, 212, 255, 0.015) 4px
        );
        pointer-events: none;
        z-index: 1;
      }

      /* ── Main card ── */
      .login-wrapper {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 440px;
        padding: 20px;
        animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(30px);
      }

      @keyframes cardIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .login-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 40px;
        box-shadow:
          0 0 0 1px rgba(0, 212, 255, 0.05),
          0 20px 60px rgba(0, 0, 0, 0.6),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
      }

      /* ── Logo area ── */
      .logo-area {
        text-align: center;
        margin-bottom: 32px;
      }

      .logo-icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 16px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        animation: logoPulse 3s ease-in-out infinite;
      }

      @keyframes logoPulse {
        0%,
        100% {
          box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        50% {
          box-shadow: 0 0 40px rgba(0, 212, 255, 0.6);
        }
      }

      .logo-title {
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 2px;
        color: var(--text);
      }

      .logo-title span {
        color: var(--accent);
      }

      .logo-subtitle {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 3px;
        margin-top: 6px;
      }

      /* ── Status bar ── */
      .status-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(0, 255, 136, 0.05);
        border: 1px solid rgba(0, 255, 136, 0.15);
        border-radius: 8px;
        padding: 8px 12px;
        margin-bottom: 28px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        animation: blink 2s ease-in-out infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      .status-text {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--green);
        letter-spacing: 1px;
      }

      /* ── Form ── */
      .form-group {
        margin-bottom: 20px;
      }

      .form-label {
        display: block;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--accent);
        letter-spacing: 2px;
        margin-bottom: 8px;
      }

      .form-input {
        width: 100%;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 16px;
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 14px;
        outline: none;
        transition: all 0.3s ease;
      }

      .form-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        background: rgba(0, 212, 255, 0.03);
      }

      .form-input::placeholder {
        color: var(--muted);
      }

      /* ── Login button ── */
      .btn-login {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border: none;
        border-radius: 8px;
        color: #000;
        font-family: var(--font-main);
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 2px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 8px;
        position: relative;
        overflow: hidden;
      }

      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
      }

      .btn-login:active {
        transform: translateY(0);
      }

      .btn-login.loading {
        pointer-events: none;
        opacity: 0.7;
      }

      /* ── Error message ── */
      .error-msg {
        display: none;
        background: rgba(255, 71, 87, 0.1);
        border: 1px solid rgba(255, 71, 87, 0.3);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 16px;
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--red);
        text-align: center;
      }

      .error-msg.show {
        display: block;
        animation: shake 0.4s ease;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-8px);
        }
        75% {
          transform: translateX(8px);
        }
      }

      /* ── Credentials hint ── */
      .creds-hint {
        margin-top: 28px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
      }

      .creds-title {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 2px;
        text-align: center;
        margin-bottom: 12px;
      }

      .creds-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .cred-item {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .cred-item:hover {
        border-color: var(--accent);
        background: rgba(0, 212, 255, 0.05);
      }

      .cred-role {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--accent);
        letter-spacing: 1px;
      }

      .cred-user {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        margin-top: 2px;
      }

      /* ── Corner decorations ── */
      .corner {
        position: absolute;
        width: 20px;
        height: 20px;
      }

      .corner-tl {
        top: -1px;
        left: -1px;
        border-top: 2px solid var(--accent);
        border-left: 2px solid var(--accent);
        border-radius: 4px 0 0 0;
      }

      .corner-tr {
        top: -1px;
        right: -1px;
        border-top: 2px solid var(--accent);
        border-right: 2px solid var(--accent);
        border-radius: 0 4px 0 0;
      }

      .corner-bl {
        bottom: -1px;
        left: -1px;
        border-bottom: 2px solid var(--accent);
        border-left: 2px solid var(--accent);
        border-radius: 0 0 0 4px;
      }

      .corner-br {
        bottom: -1px;
        right: -1px;
        border-bottom: 2px solid var(--accent);
        border-right: 2px solid var(--accent);
        border-radius: 0 0 4px 0;
      }
    </style>
  </head>
  <body>
    <!-- Background effects -->
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="scanline"></div>

    <!-- Login card -->
    <div class="login-wrapper">
      <div class="login-card" style="position: relative">
        <!-- Corner decorations -->
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <!-- Logo -->
        <div class="logo-area">
          <div class="logo-icon">🛡</div>
          <div class="logo-title">Infra<span>Guard</span> AI</div>
          <div class="logo-subtitle">INFRASTRUCTURE MONITORING PLATFORM</div>
        </div>

        <!-- Status indicator -->
        <div class="status-bar">
          <div class="status-dot"></div>
          <div class="status-text">SYSTEM ONLINE — ALL 9 NODES ACTIVE</div>
        </div>

        <!-- Login form -->
        <div class="form-group">
          <label class="form-label">USERNAME</label>
          <input
            type="text"
            id="username"
            class="form-input"
            placeholder="Enter username"
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label class="form-label">PASSWORD</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Enter password"
            autocomplete="current-password"
          />
        </div>

        <button class="btn-login" id="loginBtn" onclick="doLogin()">
          AUTHENTICATE
        </button>

        <div class="error-msg" id="errorMsg">
          ⚠ Invalid credentials — access denied
        </div>

        <!-- Quick login hints -->
        <div class="creds-hint">
          <div class="creds-title">QUICK LOGIN — CLICK TO FILL</div>
          <div class="creds-grid">
            <div class="cred-item" onclick="fillCreds('admin', 'admin123')">
              <div class="cred-role">ADMIN</div>
              <div class="cred-user">admin</div>
            </div>
            <div class="cred-item" onclick="fillCreds('engineer', 'eng123')">
              <div class="cred-role">ENGINEER</div>
              <div class="cred-user">engineer</div>
            </div>
            <div class="cred-item" onclick="fillCreds('viewer', 'view123')">
              <div class="cred-role">VIEWER</div>
              <div class="cred-user">viewer</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Fill credentials on click
      function fillCreds(user, pass) {
        document.getElementById("username").value = user;
        document.getElementById("password").value = pass;
        document.getElementById("username").focus();
      }

      // Login on Enter key
      document.addEventListener("keydown", function (e) {
        if (e.key === "Enter") doLogin();
      });

      // Main login function
      async function doLogin() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const btn = document.getElementById("loginBtn");
        const errorMsg = document.getElementById("errorMsg");

        if (!username || !password) {
          showError("Please enter username and password");
          return;
        }

        // Loading state
        btn.textContent = "AUTHENTICATING...";
        btn.classList.add("loading");
        errorMsg.classList.remove("show");

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          const data = await response.json();

          if (data.success) {
            btn.textContent = "✓ ACCESS GRANTED";
            btn.style.background = "linear-gradient(135deg, #00ff88, #00cc66)";
            setTimeout(() => {
              window.location.href = "/overview";
            }, 800);
          } else {
            showError("Invalid credentials — access denied");
          }
        } catch (err) {
          showError("Connection error — server unreachable");
        } finally {
          setTimeout(() => {
            btn.textContent = "AUTHENTICATE";
            btn.classList.remove("loading");
            btn.style.background = "";
          }, 2000);
        }
      }

      function showError(msg) {
        const errorMsg = document.getElementById("errorMsg");
        errorMsg.textContent = "⚠ " + msg;
        errorMsg.classList.add("show");
      }
    </script>
  </body>
</html>
